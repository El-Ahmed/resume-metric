<app-resume-selector
  [isLoading]="resumeWorkflow.isResumeFileLoading()"
  (resumeFile)="resumeWorkflow.loadResumeFile($event)"
/>

@if (resumeWorkflow.markdownResume(); as text) {
  <app-text-redactor [text]="text" (redactedText)="resumeWorkflow.loadRedactedText($event)" />
}
@if (resumeWorkflow.redactedText(); as text) {
  <pre>{{ text }}</pre>
}
